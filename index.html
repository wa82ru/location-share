<!-- version: 1.4.0 -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いまどこにいる？</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
    .name-tag {
      display: inline-block;
      background: #eef4ff;
      color: #4f8ef7;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #3a7ae0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .result { margin-top: 24px; display: none; }
    .map-link {
      display: block;
      margin-top: 16px;
      padding: 12px;
      background: #f0f7ff;
      border-radius: 10px;
      color: #4f8ef7;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }
    .map-link:hover { background: #dbeeff; }
    .coords { font-size: 12px; color: #999; margin-top: 10px; }
    .slack-status { margin-top: 12px; font-size: 13px; color: #666; }
    .slack-status.sent { color: #2eb67d; }
    .error { margin-top: 20px; color: #e05555; font-size: 14px; display: none; }
    .version { margin-top: 32px; font-size: 11px; color: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📍</div>
    <h1>いまどこにいる？</h1>
    <div class="name-tag" id="nameTag"></div>
    <p>ボタンを押すと現在地を取得して、GoogleマップのリンクをSlackに送信します。<br>ブラウザから位置情報の許可を求められたら「許可」してください。</p>
    <button id="btn" onclick="getLocation()">現在地を取得してSlackに送る</button>
    <div class="result" id="result">
      <a class="map-link" id="mapLink" target="_blank">🗺️ Googleマップで開く</a>
      <div class="coords" id="coords"></div>
      <div class="slack-status" id="slackStatus">📨 Slackに送信中...</div>
    </div>
    <div class="error" id="error">
      位置情報の取得に失敗しました。<br>ブラウザの設定で位置情報を許可してください。
    </div>
    <div class="version">v1.4.0</div>
  </div>
  <script>
    const PROXY_URL = 'https://frosty-pine-f685slack-proxy.mynameiswataru.workers.dev';
    const params = new URLSearchParams(window.location.search);
    const userName = params.get('0') || '名無し';

    document.getElementById('nameTag').textContent = '👤 ' + userName;

    function getDeviceInfo() {
      const ua = navigator.userAgent;

      // OS判定
      let os = '不明';
      if (/Windows NT 10/.test(ua)) os = 'Windows 10/11';
      else if (/Windows NT 6/.test(ua)) os = 'Windows 8以前';
      else if (/Mac OS X/.test(ua)) {
        const match = ua.match(/Mac OS X ([\d_]+)/);
        os = 'macOS ' + (match ? match[1].replace(/_/g, '.') : '');
      } else if (/iPhone/.test(ua)) {
        const match = ua.match(/OS ([\d_]+)/);
        os = 'iOS ' + (match ? match[1].replace(/_/g, '.') : '');
      } else if (/iPad/.test(ua)) {
        const match = ua.match(/OS ([\d_]+)/);
        os = 'iPadOS ' + (match ? match[1].replace(/_/g, '.') : '');
      } else if (/Android/.test(ua)) {
        const match = ua.match(/Android ([\d.]+)/);
        os = 'Android ' + (match ? match[1] : '');
      } else if (/Linux/.test(ua)) os = 'Linux';

      // デバイス種別
      let device = 'PC';
      if (/iPhone/.test(ua)) device = 'iPhone';
      else if (/iPad/.test(ua)) device = 'iPad';
      else if (/Android.*Mobile/.test(ua)) device = 'Androidスマホ';
      else if (/Android/.test(ua)) device = 'Androidタブレット';

      // ブラウザ判定
      let browser = '不明';
      if (/Edg\//.test(ua)) {
        const match = ua.match(/Edg\/([\d.]+)/);
        browser = 'Edge ' + (match ? match[1] : '');
      } else if (/OPR\//.test(ua)) {
        const match = ua.match(/OPR\/([\d.]+)/);
        browser = 'Opera ' + (match ? match[1] : '');
      } else if (/Chrome\//.test(ua)) {
        const match = ua.match(/Chrome\/([\d.]+)/);
        browser = 'Chrome ' + (match ? match[1] : '');
      } else if (/Firefox\//.test(ua)) {
        const match = ua.match(/Firefox\/([\d.]+)/);
        browser = 'Firefox ' + (match ? match[1] : '');
      } else if (/Safari\//.test(ua)) {
        const match = ua.match(/Version\/([\d.]+)/);
        browser = 'Safari ' + (match ? match[1] : '');
      }

      // ネットワーク
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      const network = conn ? (conn.effectiveType || conn.type || '不明') : '不明';

      // 画面解像度
      const screen_info = `${window.screen.width}x${window.screen.height}`;

      // 言語
      const lang = navigator.language || '不明';

      // タイムゾーン
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '不明';

      return { os, device, browser, network, screen_info, lang, tz };
    }

    function getLocation() {
      const btn = document.getElementById('btn');
      btn.textContent = '取得中...';
      btn.disabled = true;
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          const lat = pos.coords.latitude.toFixed(6);
          const lng = pos.coords.longitude.toFixed(6);
          const mapUrl = `https://www.google.com/maps?q=${lat},${lng}`;
          document.getElementById('mapLink').href = mapUrl;
          document.getElementById('coords').textContent = `緯度: ${lat} / 経度: ${lng}`;
          document.getElementById('result').style.display = 'block';
          btn.textContent = '再取得する';
          btn.disabled = false;
          sendToSlack(mapUrl, lat, lng);
        },
        function(err) {
          document.getElementById('error').style.display = 'block';
          btn.textContent = '現在地を取得してSlackに送る';
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function sendToSlack(mapUrl, lat, lng) {
      const d = getDeviceInfo();
      const message = [
        `📍 *${userName}* の現在地が共有されました！`,
        `🗺️ ${mapUrl}`,
        `緯度: ${lat} / 経度: ${lng}`,
        ``,
        `📱 デバイス: ${d.device}`,
        `💻 OS: ${d.os}`,
        `🌐 ブラウザ: ${d.browser}`,
        `📡 ネットワーク: ${d.network}`,
        `🖥️ 解像度: ${d.screen_info}`,
        `🗣️ 言語: ${d.lang}`,
        `🕐 タイムゾーン: ${d.tz}`,
      ].join('\n');

      fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: message })
      }).then(res => res.json()).then(data => {
        const status = document.getElementById('slackStatus');
        status.textContent = data.ok ? '✅ Slackに送信しました！' : '⚠️ 送信に失敗しました';
        status.className = data.ok ? 'slack-status sent' : 'slack-status';
      }).catch(() => {
        document.getElementById('slackStatus').textContent = '⚠️ Slack送信に失敗しました';
      });
    }
  </script>
</body>
</html>
